data:
  corpus_path: data/sample_course_docs.jsonl
  queries_path: data/sample_queries.jsonl
retriever:
  name: hybrid
  weights: [0.45, 0.55]
  components:
    - name: bm25
      params:
        k1: 1.5
        b: 0.75
    - name: dense
      params:
        model_name: sentence-transformers/all-MiniLM-L6-v2
        batch_size: 16
        normalize_embeddings: true
reranker:
  enabled: true
  name: cross_encoder
  params:
    model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
top_k: 10
rerank_top_k: 5
metrics_ks: [1, 3, 5, 10]
output_dir: outputs/hybrid_rerank_minilm
