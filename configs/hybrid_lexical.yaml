data:
  corpus_path: data/sample_course_docs.jsonl
  queries_path: data/sample_queries.jsonl
retriever:
  name: hybrid
  weights: [0.6, 0.4]
  components:
    - name: bm25
      params:
        k1: 1.5
        b: 0.75
    - name: tfidf
      params:
        ngram_range: [1, 2]
        min_df: 1
top_k: 10
metrics_ks: [1, 3, 5, 10]
output_dir: outputs/hybrid_lexical
